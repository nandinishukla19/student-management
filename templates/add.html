<!DOCTYPE html>
<html>
<head>
    <title>Add Student</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <h2>Add Student</h2>

    <form method="POST" class="mt-3">

        <input type="text" name="name" placeholder="Enter Name" class="form-control mb-3">

        <input type="number" name="age" placeholder="Enter Age" class="form-control mb-3">

        <input type="text" name="course" placeholder="Enter Course" class="form-control mb-3">

        <button type="submit" class="btn btn-primary">Add Student</button>

    </form>

    <br>
    <a href="/" class="btn btn-secondary">Back</a>
    <a href="/logout" class="btn btn-danger">Logout</a>
</div>

</body>
</html>

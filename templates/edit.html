<!DOCTYPE html>
<html>
<head>
    <title>Edit Student</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">

    <h2>Edit Student</h2>

    <form method="POST">

        <input type="text" name="name" value="{{ student[1] }}" class="form-control mb-3">

        <input type="number" name="age" value="{{ student[2] }}" class="form-control mb-3">

        <input type="text" name="course" value="{{ student[3] }}" class="form-control mb-3">

        <button type="submit" class="btn btn-success">Update</button>

    </form>

    <br>
    <a href="/view" class="btn btn-secondary">Back</a>
    <a href="/logout" class="btn btn-danger">Logout</a>
</div>

</body>
</html>
